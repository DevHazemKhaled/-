<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة التسجيل في كورس بايثون</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <form>
            <h2>ابدأ تعلم البرمجة</h2>
            
            <div class="form-group">
                <label for="full-name">الاسم بالكامل (باللغة العربية)</label>
                <input type="text" id="full-name" placeholder="مثال : مي عبدالناصر" required>
            </div>

            <div class="form-group">
                <label for="phone-number">رقم الهاتف (واتساب)</label>
                <input type="number" id="phone-number" placeholder="مثال: 01xxxxxxxxx" required>
            </div>

            <div class="form-group">
                <label for="mail">البريد الإلكتروني</label>
                <input type="email" id="mail" placeholder="name@example.com" required>
            </div>

            <input type="submit" value="ابدأ التعلم">
            <h2>المطور : Mai Abd Elnaseer</h2>
        </form>

    </main>

</body>
</html>
